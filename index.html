<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업 관리 시스템 Pro</title>
<style>
  /* 1. form-preview.html의 디자인 시스템을 그대로 이식했습니다 */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }
  .app { display: flex; height: 100vh; }
  
  /* 사이드바 스타일 */
  .sidebar { width: 220px; background: #fff; border-right: 1px solid #e8e8e6; display: flex; flex-direction: column; padding: 1rem 0; }
  .nav-item { padding: 10px 1.25rem; cursor: pointer; color: #666; border-radius: 8px; margin: 0 0.5rem 4px; transition: 0.2s; }
  .nav-item.active { background: #f0effe; color: #7F77DD; font-weight: 600; }
  
  /* 메인 영역 */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { padding: 1rem 1.5rem; border-bottom: 1px solid #e8e8e6; background: #fff; display: flex; align-items: center; justify-content: space-between; }
  .content { flex: 1; overflow-y: auto; padding: 2rem; }

  /* form-preview.html 스타일 재현 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: #fff; width: 640px; max-height: 85vh; overflow-y: auto; border-radius: 16px; padding: 2rem; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
  .section { border: 1px solid #e8e8e6; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; background: #fff; }
  .section-title { font-size: 11px; font-weight: 700; color: #7F77DD; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 1.25rem; border-bottom: 1px solid #f0f0ee; padding-bottom: 8px; }
  
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; font-weight: 500; }
  input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d0d0cc; border-radius: 8px; font-size: 13px; outline: none; transition: 0.2s; }
  input:focus { border-color: #7F77DD; box-shadow: 0 0 0 3px rgba(127,119,221,0.1); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  
  .btn { padding: 10px 20px; border-radius: 8px; border: 1px solid #d0d0cc; background: #fff; cursor: pointer; font-weight: 500; }
  .btn-primary { background: #7F77DD; color: #fff; border: none; }
  .btn-primary:hover { background: #6a62c4; }

  /* 목록 테이블 스타일 */
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e8e8e6; }
  th { background: #f9f9f7; padding: 12px; font-size: 12px; color: #888; text-align: left; }
  td { padding: 14px 12px; border-top: 1px solid #f0f0ee; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div style="padding: 0 1.25rem 1.5rem; font-weight: 800; font-size: 18px; color: #7F77DD;">PMS System</div>
    <div class="nav-item active" onclick="showPage('dashboard')">대시보드</div>
    <div class="nav-item" onclick="showPage('projects')">사업 목록</div>
  </div>
  
  <div class="main">
    <div class="topbar">
      <h2 id="page-title">대시보드</h2>
      <span id="sync-status" style="font-size: 11px; color: #999; background: #f0f0ee; padding: 4px 8px; border-radius: 4px;">상태 확인 중...</span>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="modal-container"></div>

<script>
  let DB = { projects: [] };

  function showPage(p) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('page-title').textContent = (p === 'dashboard' ? '대시보드' : '사업 목록 관리');
    if (p === 'dashboard') renderDashboard();
    else renderProjects();
  }

  function renderDashboard() {
    const total = DB.projects.length;
    document.getElementById('content').innerHTML = `
      <div class="section">
        <h3 style="color:#666; font-size:14px;">관리 중인 총 사업</h3>
        <h1 style="font-size:32px; margin-top:10px;">${total} <span style="font-size:16px; color:#999;">건</span></h1>
      </div>`;
  }

  function renderProjects() {
    document.getElementById('content').innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h3 style="font-weight:600;">사업 리스트</h3>
        <button class="btn btn-primary" onclick="openFullModal()">+ 신규 사업 등록</button>
      </div>
      <table>
        <thead>
          <tr><th>발주기관</th><th>사업명</th><th>시작일</th><th>상태</th><th>관리</th></tr>
        </thead>
        <tbody>
          ${DB.projects.map(p => `
            <tr>
              <td style="color:#666;">${p.org_name || '-'}</td>
              <td><strong>${p.name}</strong></td>
              <td style="color:#888;">${p.start_date || '-'}</td>
              <td><span style="background:#f0effe; color:#7F77DD; padding:4px 8px; border-radius:4px; font-size:12px;">${p.status}</span></td>
              <td><button class="btn" style="padding:4px 10px; font-size:12px;" onclick="openFullModal(${p.id})">수정</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // --- form-preview.html의 디자인을 완벽히 가져온 모달 ---
  function openFullModal(id = null) {
    const p = id ? DB.projects.find(x => x.id === id) : null;
    document.getElementById('modal-container').innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this) this.remove()">
        <div class="modal">
          <h2 style="margin-bottom:1.5rem;">${p ? '사업 정보 수정' : '신규 사업 등록'}</h2>
          
          <div class="section">
            <div class="section-title">기본 정보</div>
            <div class="form-row">
              <div class="form-group">
                <label>사업구분</label>
                <select id="f-biz-type">
                  <option ${p?.biz_type==='프로젝트'?'selected':''}>프로젝트</option>
                  <option ${p?.biz_type==='유지보수'?'selected':''}>유지보수</option>
                </select>
              </div>
              <div class="form-group">
                <label>발주기관</label>
                <input id="f-org" placeholder="기관명 입력" value="${p?.org_name||''}">
              </div>
            </div>
            <div class="form-group">
              <label>사업명</label>
              <input id="f-name" placeholder="전체 사업명 입력" value="${p?.name||''}">
            </div>
            <div class="form-row">
              <div class="form-group"><label>시스템구분</label><input id="f-sys" placeholder="예: PCMS" value="${p?.sys_type||''}"></div>
              <div class="form-group"><label>사업유형</label><input id="f-type" placeholder="예: 고도화" value="${p?.project_type||''}"></div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">일정 및 예산</div>
            <div class="form-row">
              <div class="form-group"><label>시작일</label><input type="date" id="f-start" value="${p?.start_date||''}"></div>
              <div class="form-group"><label>종료일</label><input type="date" id="f-due" value="${p?.due_date||''}"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>총사업비(VAT포함)</label><input type="number" id="f-budget" placeholder="숫자만 입력" value="${p?.budget_vat||''}"></div>
              <div class="form-group"><label>진행현황</label><select id="f-status"><option ${p?.status==='진행중'?'selected':''}>진행중</option><option ${p?.status==='완료'?'selected':''}>완료</option></select></div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">담당자 및 비고</div>
            <div class="form-group"><label>담당 PM</label><input id="f-pm" placeholder="수행사 PM 이름" value="${p?.pm_name||''}"></div>
            <div class="form-group"><label>비고(메모)</label><textarea id="f-memo" rows="3" placeholder="추가 전달사항">${p?.memo||''}</textarea></div>
          </div>

          <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
            <button class="btn" onclick="document.getElementById('modal-container').innerHTML=''">취소</button>
            <button class="btn btn-primary" onclick="saveData(${id})">데이터베이스에 저장</button>
          </div>
        </div>
      </div>`;
  }

  async function saveData(id) {
    const projectData = {
      biz_type: document.getElementById('f-biz-type').value,
      org_name: document.getElementById('f-org').value,
      name: document.getElementById('f-name').value,
      sys_type: document.getElementById('f-sys').value,
      project_type: document.getElementById('f-type').value,
      status: document.getElementById('f-status').value,
      start_date: document.getElementById('f-start').value,
      due_date: document.getElementById('f-due').value,
      budget_vat: parseInt(document.getElementById('f-budget').value) || 0,
      pm_name: document.getElementById('f-pm').value,
      memo: document.getElementById('f-memo').value
    };

    if (id) projectData.id = id;

    if (window.saveToSupabase) {
      await window.saveToSupabase(projectData);
      document.getElementById('modal-container').innerHTML = '';
    }
  }
</script>

<script type="module">
  import { createClient } from 'https://jspm.dev/@supabase/supabase-js'

  const supabaseUrl = 'https://isgzupwfjmafaiujbkkz.supabase.co'; 
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzZ3p1cHdmam1hZmFpdWpia2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTA4NjksImV4cCI6MjA5MjQ2Njg2OX0.l7BmUVw24HC322fbFX4av_4pU0Zd4j92nm_xfGtmpS4';
  const supabase = createClient(supabaseUrl, supabaseKey);

  window.supabase = supabase;
  const statusEl = document.getElementById('sync-status');

  async function loadDB() {
    const { data, error } = await supabase.from('projects').select('*').order('id', { ascending: false });
    if (data) {
      DB.projects = data;
      statusEl.textContent = '☁️ DB 연결됨';
      showPage('dashboard');
    } else {
      statusEl.textContent = '❌ 연결 실패';
    }
  }

  window.saveToSupabase = async function(obj) {
    statusEl.textContent = '⏳ 저장 중...';
    const { error } = await supabase.from('projects').upsert([obj]);
    if (!error) {
      statusEl.textContent = '✅ 저장 성공';
      loadDB();
    } else {
      alert("저장 에러: " + error.message);
    }
  }

  loadDB();
</script>
</body>
</html>
