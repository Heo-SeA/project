<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업 관리 시스템 Pro (Supabase 연동)</title>
<style>
  /* 1. 디자인: form-preview.html의 스타일을 그대로 가져왔습니다 */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; font-size: 14px; }
  .app { display: flex; height: 100vh; }
  .sidebar { width: 220px; background: #fff; border-right: 1px solid #e8e8e6; display: flex; flex-direction: column; padding: 1rem 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { padding: 1rem 1.5rem; border-bottom: 1px solid #e8e8e6; background: #fff; display: flex; align-items: center; justify-content: space-between; }
  .content { flex: 1; overflow-y: auto; padding: 1.5rem; }
  .nav-item { padding: 10px 1rem; cursor: pointer; color: #666; border-radius: 6px; margin: 0 0.5rem; }
  .nav-item.active { background: #f0effe; color: #7F77DD; font-weight: 600; }

  /* 모달 레이아웃 (form-preview와 동일) */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .modal { background: #fff; width: 680px; max-height: 90vh; overflow-y: auto; border-radius: 16px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
  .section-title { font-size: 11px; font-weight: 700; color: #7F77DD; text-transform: uppercase; margin-bottom: 1rem; border-bottom: 1px solid #f0f0ee; padding-bottom: 5px; }
  .form-group { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #d0d0cc; border-radius: 8px; font-size: 13px; outline: none; }
  input:focus { border-color: #7F77DD; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn { padding: 8px 20px; border-radius: 8px; border: 1px solid #d0d0cc; background: #fff; cursor: pointer; }
  .btn-primary { background: #7F77DD; color: #fff; border: none; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div style="padding: 0 1rem 1rem; font-weight: 700; font-size: 16px;">💼 사업 관리 Pro</div>
    <div class="nav-item active" onclick="showPage('dashboard')">대시보드</div>
    <div class="nav-item" onclick="showPage('projects')">사업 목록</div>
  </div>
  <div class="main">
    <div class="topbar">
      <h2 id="page-title">대시보드</h2>
      <span id="sync-status" style="font-size: 11px; color: #999;">연결 확인 중...</span>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="modal-container"></div>

<script>
  let DB = { projects: [] };

  function showPage(p) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    document.getElementById('page-title').textContent = (p === 'dashboard' ? '대시보드' : '사업 목록');
    if (p === 'dashboard') renderDashboard();
    else renderProjects();
  }

  function renderDashboard() {
    const total = DB.projects.length;
    document.getElementById('content').innerHTML = `<div class="card" style="background:#fff; padding:20px; border-radius:12px; border:1px solid #eee;"><h3>전체 사업 수</h3><h1>${total}건</h1></div>`;
  }

  function renderProjects() {
    document.getElementById('content').innerHTML = `
      <div style="text-align:right; margin-bottom:1rem;">
        <button class="btn btn-primary" onclick="openFullModal()">+ 새 사업 등록</button>
      </div>
      <table style="width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden;">
        <thead style="background:#f9f9f7;"><tr style="text-align:left;">
          <th style="padding:12px;">발주기관</th><th style="padding:12px;">사업명</th><th style="padding:12px;">시작일</th><th style="padding:12px;">상태</th><th style="padding:12px;">관리</th>
        </tr></thead>
        <tbody>
          ${DB.projects.map(p => `
            <tr style="border-top:1px solid #eee;">
              <td style="padding:12px;">${p.org_name || '-'}</td>
              <td style="padding:12px;"><strong>${p.name}</strong></td>
              <td style="padding:12px;">${p.start_date || '-'}</td>
              <td style="padding:12px;">${p.status}</td>
              <td style="padding:12px;"><button class="btn" onclick="openFullModal(${p.id})">상세/수정</button></td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // --- SQL Editor 18개 컬럼 대응 모달 (디자인 통합) ---
  function openFullModal(id = null) {
    const p = id ? DB.projects.find(x => x.id === id) : null;
    document.getElementById('modal-container').innerHTML = `
      <div class="modal-overlay" onclick="if(event.target===this) this.remove()">
        <div class="modal">
          <h2 style="margin-bottom:1.5rem;">${p ? '사업 상세 수정' : '새 사업 등록'}</h2>
          
          <div class="section-title">기본 정보</div>
          <div class="form-row">
            <div class="form-group"><label>사업구분</label><select id="f-biz-type"><option ${p?.biz_type==='프로젝트'?'selected':''}>프로젝트</option><option ${p?.biz_type==='유지보수'?'selected':''}>유지보수</option></select></div>
            <div class="form-group"><label>발주기관</label><input id="f-org" value="${p?.org_name||''}"></div>
          </div>
          <div class="form-group"><label>사업명</label><input id="f-name" value="${p?.name||''}"></div>
          <div class="form-row">
            <div class="form-group"><label>시스템구분</label><input id="f-sys" value="${p?.sys_type||''}"></div>
            <div class="form-group"><label>사업유형</label><input id="f-type" value="${p?.project_type||''}"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>진행상태</label><select id="f-status"><option ${p?.status==='진행중'?'selected':''}>진행중</option><option ${p?.status==='완료'?'selected':''}>완료</option></select></div>
            <div class="form-group"><label>시작일</label><input type="date" id="f-start" value="${p?.start_date||''}"></div> <div class="form-group"><label>종료일</label><input type="date" id="f-due" value="${p?.due_date||''}"></div>
          </div>

          <div class="section-title">예산 및 담당자</div>
          <div class="form-row">
            <div class="form-group"><label>총사업비(VAT포함)</label><input type="number" id="f-budget" value="${p?.budget_vat||''}"></div>
            <div class="form-group"><label>담당 PM</label><input id="f-pm" value="${p?.pm_name||''}"></div>
          </div>
          
          <div class="section-title">기타 메모</div>
          <div class="form-group"><label>비고</label><textarea id="f-memo">${p?.memo||''}</textarea></div>
          <div class="form-group"><label>진행현황</label><textarea id="f-progress">${p?.progress||''}</textarea></div>

          <div class="footer">
            <button class="btn" onclick="document.getElementById('modal-container').innerHTML=''">취소</button>
            <button class="btn btn-primary" onclick="saveData(${id})">DB에 저장하기</button>
          </div>
        </div>
      </div>`;
  }

  async function saveData(id) {
    const projectData = {
      biz_type: document.getElementById('f-biz-type').value,
      org_name: document.getElementById('f-org').value,
      name: document.getElementById('f-name').value,
      sys_type: document.getElementById('f-sys').value,
      project_type: document.getElementById('f-type').value,
      status: document.getElementById('f-status').value,
      start_date: document.getElementById('f-start').value, // 시작일 저장
      due_date: document.getElementById('f-due').value,
      budget_vat: parseInt(document.getElementById('f-budget').value) || 0,
      pm_name: document.getElementById('f-pm').value,
      memo: document.getElementById('f-memo').value,
      progress: document.getElementById('f-progress').value
    };

    if (id) projectData.id = id;

    if (window.saveToSupabase) {
      await window.saveToSupabase(projectData);
      document.getElementById('modal-container').innerHTML = '';
    }
  }
</script>

<script type="module">
  import { createClient } from 'https://jspm.dev/@supabase/supabase-js'

  const supabaseUrl = 'https://isgzupwfjmafaiujbkkz.supabase.co'; 
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzZ3p1cHdmam1hZmFpdWpia2t6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4OTA4NjksImV4cCI6MjA5MjQ2Njg2OX0.l7BmUVw24HC322fbFX4av_4pU0Zd4j92nm_xfGtmpS4';
  const supabase = createClient(supabaseUrl, supabaseKey);

  window.supabase = supabase;
  const statusEl = document.getElementById('sync-status');

  async function loadDB() {
    const { data, error } = await supabase.from('projects').select('*').order('id', { ascending: false });
    if (data) {
      DB.projects = data;
      statusEl.textContent = '☁️ DB 동기화 완료';
      showPage('dashboard');
    } else {
      statusEl.textContent = '❌ 연결 실패';
    }
  }

  window.saveToSupabase = async function(obj) {
    statusEl.textContent = '⏳ 저장 중...';
    const { error } = await supabase.from('projects').upsert([obj]);
    if (!error) {
      statusEl.textContent = '✅ 저장 완료';
      loadDB();
    } else {
      alert("저장 실패: " + error.message);
    }
  }

  loadDB();
</script>
</body>
</html>
